backend:
  name: git-gateway
  branch: main

# Netlify Identity + Git Gateway is Netlify's free, built-in auth + write-access
# layer for Decap CMS — no paid backend, no server to run. Visitors never see
# this panel: it isn't linked anywhere on the public site, and Git Gateway only
# lets people you've explicitly invited via Netlify Identity sign in.
#
# One-time setup on Netlify (free), to make login GitHub-only:
#   1. Site settings → Identity → Enable Identity
#   2. Identity → Registration → set to "Invite only"
#   3. Identity → External providers → enable "GitHub" (this is what lets you
#      click "Log in with GitHub" on the /admin screen instead of a password)
#   4. Identity → Emails → optional: turn off email/password signup entirely
#      so GitHub is the only sign-in method
#   5. Identity → Services → Git Gateway → Enable
#   6. Identity tab → Invite users → invite your own GitHub email address
# After this, only your invited GitHub account can ever log in at /admin/ —
# anyone else who finds the URL just sees a login screen with no way in.

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "projects"
    label: "Portfolio Projects"
    label_singular: "Project"
    description: "Every project card AND its full case-study page. Add, edit, reorder, or delete here and the live site updates automatically — the homepage card, the case-study page, its category, and its Previous/Next navigation are all generated from this one entry. No HTML editing, ever."
    files:
      - name: "grid"
        label: "Portfolio Projects"
        file: "content/projects.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{fields.order}} — {{fields.title}} ({{fields.category}})"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Slug (URL id)"
                name: "slug"
                widget: "string"
                hint: "Lowercase, hyphens only, must be unique (e.g. my-new-project). This is how the site builds the project's case-study URL automatically — required for every project, new or existing."
              - label: "Category"
                name: "category"
                widget: "string"
                hint: "Type an EXISTING category name to file this project under it, or type a brand-new word to create a new category — the filter bar and navigation rebuild themselves from whatever categories exist. Renaming this text renames the category everywhere it's used; no project left using a name makes it disappear automatically."
              - { label: "Short Description (shown on the portfolio card)", name: "description", widget: "text" }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Service", name: "service", widget: "string", required: false, hint: "Usually the same as Category — shown in the case-study meta strip." }
              - { label: "Timeline", name: "timeline", widget: "string", required: false, hint: "e.g. 1 Week, 4 Business Days" }
              - { label: "Cover Image", name: "coverImage", widget: "image", hint: "Used as the portfolio card thumbnail and the case-study hero image." }
              - { label: "Cover Image Alt Text", name: "coverAlt", widget: "string", required: false }
              - { label: "Project Logo", name: "logo", widget: "image", required: false, hint: "Shown next to the project title on its case-study page." }
              - { label: "Overview", name: "overview", widget: "text", required: false }
              - { label: "Project Brief", name: "brief", widget: "text", required: false }
              - { label: "Goal & Challenge", name: "goal", widget: "text", required: false }
              - label: "Design Process"
                name: "process"
                widget: "list"
                required: false
                summary: "{{fields.step_title}}"
                fields:
                  - { label: "Step Title", name: "step_title", widget: "string" }
                  - { label: "Step Text", name: "step_text", widget: "text" }
                  - { label: "Step Image", name: "image", widget: "image", required: false }
                  - { label: "Step Image Alt Text", name: "imageAlt", widget: "string", required: false }
              - label: "Brand Personality (tags)"
                name: "personality"
                widget: "list"
                required: false
                field: { label: "Tag", name: "value", widget: "string" }
              - label: "Brand Colors"
                name: "colors"
                widget: "list"
                required: false
                summary: "{{fields.label}} — {{fields.hex}}"
                fields:
                  - { label: "Color Name", name: "label", widget: "string" }
                  - { label: "Hex Color", name: "hex", widget: "color" }
              - label: "Typography"
                name: "typography"
                widget: "list"
                required: false
                summary: "{{fields.font_name}} — {{fields.role}}"
                fields:
                  - { label: "Font Name (must be an exact Google Fonts name)", name: "font_name", widget: "string" }
                  - { label: "Role", name: "role", widget: "string", hint: "e.g. Display, Body / Text" }
              - label: "Mockups"
                name: "mockups"
                widget: "list"
                required: false
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string", required: false }
              - { label: "Final Outcome", name: "outcome", widget: "text", required: false }
              - label: "Gallery Images"
                name: "gallery"
                widget: "list"
                required: false
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string", required: false }
              - label: "Tools Used"
                name: "tools"
                widget: "list"
                required: false
                field: { label: "Tool", name: "value", widget: "string" }
              - label: "Deliverables"
                name: "deliverables"
                widget: "list"
                required: false
                field: { label: "Deliverable", name: "value", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Display Order", name: "order", widget: "number", value_type: "int" }
              - label: "Legacy Case Study File (leave blank for new projects)"
                name: "link"
                widget: "string"
                required: false
                hint: "Only set on the 12 original projects, pointing at their existing /projects/*.html file so old links keep working. Leave this EMPTY for any brand-new project — the site builds its case-study URL from the Slug automatically, with nothing to create or type here."

  # ================================================================
  # INTERNAL CLIENT TOOLKIT -- visible only inside this logged-in CMS.
  # Nothing on the public site (index.html, /projects/*) ever reads
  # from content/internal/, so none of this is exposed to visitors --
  # it exists purely as your own git-backed project workspace.
  # ================================================================

  - name: "internal_projects"
    label: "Toolkit - Project Manager"
    label_singular: "Project"
    description: "Your private project tracker - one entry per client engagement, current status, and internal notes."
    folder: "content/internal/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{status}} ({{client}})"
    fields:
      - { label: "Project / Client Name", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["Inquiry", "In Progress", "Awaiting Client Feedback", "Revisions", "Completed", "On Hold"]
        default: "Inquiry"
      - label: "Priority"
        name: "priority"
        widget: "select"
        options: ["Low", "Normal", "High"]
        default: "Normal"
      - { label: "Start Date", name: "start_date", widget: "datetime", required: false }
      - { label: "Due Date", name: "due_date", widget: "datetime", required: false }
      - { label: "Budget / Notes (private)", name: "body", widget: "markdown", required: false }

  - name: "internal_deliverables"
    label: "Toolkit - Client Deliverables"
    label_singular: "Deliverable"
    description: "Track what's been sent to each client, and its approval status."
    folder: "content/internal/deliverables"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{status}}"
    fields:
      - { label: "Deliverable Title", name: "title", widget: "string" }
      - { label: "Related Project / Client", name: "project", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["Draft", "Sent for Review", "Approved", "Needs Revision"]
        default: "Draft"
      - { label: "Date Sent", name: "date_sent", widget: "datetime", required: false }
      - label: "File"
        name: "file"
        widget: "file"
        media_folder: "/content/internal/files"
        public_folder: "/content/internal/files"
        required: false
      - { label: "Notes", name: "body", widget: "markdown", required: false }

  - name: "internal_versions"
    label: "Toolkit - Version Notes"
    label_singular: "Version Entry"
    description: "A running changelog per project - what changed between revisions."
    folder: "content/internal/versions"
    create: true
    slug: "{{slug}}"
    summary: "{{project}} - {{version_label}}"
    fields:
      - { label: "Related Project / Client", name: "project", widget: "string" }
      - { label: "Version Label", name: "version_label", widget: "string", hint: "e.g. v1, v2 - Revision 1" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "What Changed", name: "body", widget: "markdown" }

  - name: "internal_brand_assets"
    label: "Toolkit - Brand Assets"
    label_singular: "Brand Asset"
    description: "Logos, palettes, type specimens, and guideline files gathered per client - separate from the public portfolio images."
    folder: "content/internal/brand-assets"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{asset_type}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Related Project / Client", name: "project", widget: "string" }
      - label: "Asset Type"
        name: "asset_type"
        widget: "select"
        options: ["Logo", "Color Palette", "Typography", "Brand Guidelines", "Mockup", "Other"]
      - label: "File"
        name: "file"
        widget: "file"
        media_folder: "/content/internal/files"
        public_folder: "/content/internal/files"
        required: false
      - { label: "Notes", name: "body", widget: "markdown", required: false }

  - name: "internal_references"
    label: "Toolkit - References"
    label_singular: "Reference"
    description: "Inspiration links, competitor research, and reference material - private, not part of any client page."
    folder: "content/internal/references"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL", name: "url", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Notes", name: "body", widget: "markdown", required: false }

  - name: "internal_working_files"
    label: "Toolkit - Working Files"
    label_singular: "Working File"
    description: "Source files (.ai/.psd/.fig links, exports-in-progress) per project. For large source files, storing a cloud-drive link here keeps the git repo lightweight - Git isn't built for huge binaries."
    folder: "content/internal/working-files"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{project}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Related Project / Client", name: "project", widget: "string" }
      - { label: "External Link (Drive / Dropbox / Figma)", name: "external_link", widget: "string", required: false }
      - label: "Small File (under a few MB)"
        name: "file"
        widget: "file"
        media_folder: "/content/internal/files"
        public_folder: "/content/internal/files"
        required: false
      - { label: "Version", name: "version", widget: "string", required: false }
      - { label: "Notes", name: "body", widget: "markdown", required: false }
