<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('dh-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Content Manager — Dania Hasnain Portfolio</title>
  <!-- Netlify Identity handles login. Only you (the invited admin) can sign in — this page is
       useless to a visitor without an account, and it isn't linked from anywhere on the public site. -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
        }
      });
    }
  </script>
</body>
</html>
